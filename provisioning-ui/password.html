<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Password</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1117;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    width: 1280px;
    height: 800px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 32px 64px 28px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .back-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .back-btn:active { background: rgba(255,255,255,0.12); }
  .header h1 { font-size: 22px; font-weight: 500; margin-bottom: 2px; }
  .header p { font-size: 14px; color: rgba(255,255,255,0.45); }
  .input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    align-items: center;
  }
  .password-field {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(99,180,255,0.5);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .password-display {
    font-size: 20px;
    color: #ffffff;
    letter-spacing: 4px;
    min-height: 28px;
    flex: 1;
  }
  .show-btn {
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    cursor: pointer;
    margin-left: 12px;
  }
  .show-btn:active { background: rgba(255,255,255,0.15); }
  .connect-btn {
    background: #63b4ff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    color: #042C53;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .connect-btn:active { background: #4a9de8; }
  .connect-btn:disabled {
    background: rgba(99,180,255,0.3);
    color: rgba(4,44,83,0.5);
    cursor: default;
  }
  .error-msg {
    font-size: 14px;
    color: #E24B4A;
    margin-bottom: 12px;
    min-height: 20px;
    padding-left: 4px;
  }
  .keyboard { flex: 1; display: flex; flex-direction: column; gap: 8px; justify-content: center; }
  .kb-row { display: flex; gap: 7px; justify-content: center; }
  .key {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 8px;
    height: 52px;
    color: #ffffff;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    min-width: 0;
  }
  .key:active { background: rgba(255,255,255,0.2); }
  .key.special {
    flex: 1.5;
    background: rgba(255,255,255,0.06);
    font-size: 14px;
    color: rgba(255,255,255,0.6);
  }
  .key.space { flex: 5; font-size: 14px; color: rgba(255,255,255,0.4); }
  .key.return-key {
    flex: 1.5;
    background: rgba(99,180,255,0.15);
    color: #63b4ff;
    font-size: 14px;
  }
  .status-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .spinner {
    width: 52px; height: 52px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #63b4ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }
  .status-icon.error { background: rgba(226,75,74,0.15); }
  .status-icon.success { background: rgba(99,180,255,0.15); }
  .status-title { font-size: 22px; font-weight: 500; text-align: center; }
  .status-subtitle { font-size: 15px; color: rgba(255,255,255,0.4); text-align: center; }
  .try-again-btn {
    background: rgba(255,255,255,0.07);
    border: none;
    border-radius: 12px;
    padding: 14px 32px;
    color: rgba(255,255,255,0.8);
    font-size: 16px;
    cursor: pointer;
    margin-top: 8px;
  }
  .try-again-btn:active { background: rgba(255,255,255,0.12); }
</style>
</head>
<body>
<div id="main">
  <div class="header">
    <button class="back-btn" onclick="window.location.href='index.html'">&#8592;</button>
    <div>
      <h1>Enter password</h1>
      <p id="ssid-label">Connecting to ...</p>
    </div>
  </div>
  <div class="input-row">
    <div class="password-field">
      <div class="password-display" id="pw-display">&nbsp;</div>
      <button class="show-btn" id="show-btn" onclick="toggleShow()">Show</button>
    </div>
    <button class="connect-btn" id="connect-btn" onclick="doConnect()">Connect</button>
  </div>
  <div class="error-msg" id="error-msg"></div>
  <div class="keyboard">
    <div class="kb-row" id="row-1"></div>
    <div class="kb-row" id="row-2"></div>
    <div class="kb-row" id="row-3"></div>
    <div class="kb-row" id="row-space"></div>
  </div>
</div>
<div id="status" style="display:none; flex-direction:column; flex:1; padding:32px 64px 28px;">
  <div class="status-screen">
    <div id="status-icon" class="status-icon"></div>
    <div id="status-title" class="status-title"></div>
    <div id="status-subtitle" class="status-subtitle"></div>
    <button id="status-btn" class="try-again-btn" style="display:none"></button>
  </div>
</div>
<script>
  const ssid = sessionStorage.getItem('ssid') || '';
  document.getElementById('ssid-label').textContent = 'Connecting to ' + ssid;

  let password = '';
  let showPassword = false;
  let isNumbers = false;

  const alpha = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['⇧','Z','X','C','V','B','N','M','⌫']
  ];
  const nums = [
    ['1','2','3','4','5','6','7','8','9','0'],
    ['-','/','.',',','\'','"','?','!','(','⌫'],
    ['@','#','$','%','&','*','+','=','~','⌫']
  ];

  function buildKeyboard() {
    const rows = isNumbers ? nums : alpha;
    ['row-1','row-2','row-3'].forEach((id, i) => {
      const row = document.getElementById(id);
      row.innerHTML = '';
      rows[i].forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'key' + (k === '⇧' || k === '⌫' ? ' special' : '');
        btn.textContent = k;
        btn.onclick = () => handleKey(k);
        row.appendChild(btn);
      });
    });
    const spaceRow = document.getElementById('row-space');
    spaceRow.innerHTML = '';
    const numToggle = document.createElement('button');
    numToggle.className = 'key special';
    numToggle.textContent = isNumbers ? 'ABC' : '123';
    numToggle.onclick = () => { isNumbers = !isNumbers; buildKeyboard(); };
    const space = document.createElement('button');
    space.className = 'key space';
    space.textContent = 'space';
    space.onclick = () => { password += ' '; updateDisplay(); };
    const ret = document.createElement('button');
    ret.className = 'key return-key';
    ret.textContent = 'return';
    ret.onclick = doConnect;
    spaceRow.appendChild(numToggle);
    spaceRow.appendChild(space);
    spaceRow.appendChild(ret);
  }

  function handleKey(k) {
    if (k === '⌫') {
      password = password.slice(0, -1);
    } else if (k === '⇧') {
      isNumbers = false;
      buildKeyboard();
      return;
    } else {
      password += k;
    }
    updateDisplay();
  }

  function updateDisplay() {
    const d = document.getElementById('pw-display');
    if (password === '') {
      d.innerHTML = '&nbsp;';
    } else if (showPassword) {
      d.textContent = password;
    } else {
      d.textContent = '•'.repeat(password.length);
    }
    document.getElementById('error-msg').textContent = '';
  }

  function toggleShow() {
    showPassword = !showPassword;
    document.getElementById('show-btn').textContent = showPassword ? 'Hide' : 'Show';
    updateDisplay();
  }

  function showStatus(type, title, subtitle, btnText, btnAction) {
    document.getElementById('main').style.display = 'none';
    const s = document.getElementById('status');
    s.style.display = 'flex';
    const icons = { connecting: '', error: '!', success: '✓' };
    const icon = document.getElementById('status-icon');
    icon.className = 'status-icon ' + (type === 'error' ? 'error' : type === 'success' ? 'success' : '');
    if (type === 'connecting') {
      icon.innerHTML = '<div class="spinner"></div>';
    } else {
      icon.textContent = icons[type];
    }
    document.getElementById('status-title').textContent = title;
    document.getElementById('status-subtitle').textContent = subtitle;
    const btn = document.getElementById('status-btn');
    if (btnText) {
      btn.style.display = 'block';
      btn.textContent = btnText;
      btn.onclick = btnAction;
    } else {
      btn.style.display = 'none';
    }
  }

  function doConnect() {
    if (password.length === 0) {
      document.getElementById('error-msg').textContent = 'Please enter the network password';
      return;
    }
    showStatus('connecting', 'Connecting to ' + ssid, 'This may take a few seconds');
    fetch('/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ssid: ssid, password: password })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        showStatus('success', 'Connected', 'Returning to dashboard...');
        setTimeout(() => { window.close(); }, 3000);
      } else {
        const messages = {
          'incorrect_password': ['Incorrect password', 'Please check the password and try again'],
          'network_not_found':  ['Network not found', 'Please check your router is on and try again'],
          'timeout':            ['Connection timed out', 'Please check the password and try again'],
          'connection_failed':  ['Could not connect', 'Please check the password and try again']
        };
        const [title, subtitle] = messages[data.error] || ['Could not connect', 'Please try again'];
        showStatus('error', title, subtitle, 'Try again', () => {
          password = '';
          document.getElementById('main').style.display = 'flex';
          document.getElementById('status').style.display = 'none';
          document.getElementById('main').style.flexDirection = 'column';
          updateDisplay();
        });
      }
    })
    .catch(() => {
      showStatus('error', 'Could not connect', 'Please try again', 'Try again', () => {
        password = '';
        document.getElementById('main').style.display = 'flex';
        document.getElementById('status').style.display = 'none';
        document.getElementById('main').style.flexDirection = 'column';
        updateDisplay();
      });
    });
  }

  buildKeyboard();
</script>
</body>
</html>
